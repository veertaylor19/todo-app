<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veer's To-Do App</title>
  <script>
    (function() {
      const t = localStorage.getItem('veer-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    /* ── color tokens ── */
    :root {
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --text:         #1a1a1a;
      --text-muted:   #888;
      --text-faint:   #bbb;
      --border:       #e0e0e0;
      --border-light: #f0f0f0;
      --input-bg:     #ffffff;
      --input-text:   #1a1a1a;
      --sub-btn-bg:   #e2e8f0;
      --sub-btn-text: #334155;
      --shadow:       rgba(0,0,0,0.08);
      --placeholder:  #aaa;
    }

    [data-theme="dark"] {
      --bg:           #0f1117;
      --surface:      #1a1d2e;
      --text:         #e2e8f0;
      --text-muted:   #64748b;
      --text-faint:   #3d4466;
      --border:       #2d3148;
      --border-light: #1e2235;
      --input-bg:     #13162a;
      --input-text:   #e2e8f0;
      --sub-btn-bg:   #252844;
      --sub-btn-text: #94a3b8;
      --shadow:       rgba(0,0,0,0.4);
      --placeholder:  #475569;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      transition: background 0.2s, color 0.2s;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 24px;
      color: var(--text);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── top bar ── */
    .top-bar { display: flex; flex-direction: column; gap: 10px; }

    .search-wrap { position: relative; }

    .search-wrap input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s;
    }

    .search-wrap input::placeholder { color: var(--placeholder); }
    .search-wrap input:focus { border-color: #2563eb; }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .stats-export-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .stats-bar { font-size: 0.8rem; color: var(--text-muted); }
    .stats-bar span { margin-right: 14px; }
    .stats-bar strong { color: var(--text); }

    .top-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .export-btn, .theme-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .export-btn:hover { border-color: #2563eb; color: #2563eb; background: rgba(37,99,235,0.08); }
    .theme-btn:hover  { border-color: var(--text-muted); color: var(--text); }

    /* ── today alert ── */
    .today-alert {
      background: rgba(239,68,68,0.12);
      border: 1.5px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #ef4444;
      font-weight: 600;
    }

    /* ── sections ── */
    .section {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px var(--shadow);
      transition: background 0.2s;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h2 { font-size: 1.2rem; }
    .section.tasks h2        { color: #3b82f6; }
    .section.ideas h2        { color: #a855f7; }
    .section.competitions h2 { color: #f97316; }
    .section.finished-box h2 { color: #22c55e; }

    .notif-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .notif-btn:hover { border-color: #f97316; color: #f97316; }
    .notif-btn.on    { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.08); }

    /* ── add forms ── */
    .add-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .add-row input[type="text"],
    .add-row input[type="date"],
    .add-row select {
      padding: 10px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      background: var(--input-bg);
      color: var(--input-text);
      transition: border-color 0.2s, background 0.2s;
    }

    .add-row input[type="text"] {
      flex: 1;
      min-width: 140px;
      padding: 10px 14px;
    }

    .add-row input[type="text"]::placeholder { color: var(--placeholder); }

    .add-row select { cursor: pointer; }

    .section.tasks        .add-row input:focus,
    .section.tasks        .add-row select:focus { border-color: #3b82f6; }
    .section.ideas        .add-row input:focus,
    .section.ideas        .add-row select:focus { border-color: #a855f7; }
    .section.competitions .add-row input:focus,
    .section.competitions .add-row select:focus { border-color: #f97316; }

    /* fix dark mode select option background */
    [data-theme="dark"] .add-row select option { background: #1a1d2e; }

    .add-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .section.tasks        .add-btn { background: #3b82f6; color: #fff; }
    .section.tasks        .add-btn:hover { background: #2563eb; }
    .section.ideas        .add-btn { background: #a855f7; color: #fff; }
    .section.ideas        .add-btn:hover { background: #9333ea; }
    .section.competitions .add-btn { background: #f97316; color: #fff; }
    .section.competitions .add-btn:hover { background: #ea580c; }

    /* ── priority badges (5 levels) ── */
    .pri-badge {
      font-size: 0.65rem;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .pri-badge.critical { background: rgba(220,38,38,0.18);  color: #dc2626; }
    .pri-badge.high     { background: rgba(249,115,22,0.18); color: #ea580c; }
    .pri-badge.low      { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .pri-badge.note     { background: rgba(148,163,184,0.15);color: #94a3b8; }

    /* ── days-away badges ── */
    .days-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .days-badge.today,
    .days-badge.urgent   { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .days-badge.soon     { background: rgba(249,115,22,0.15); color: #f97316; }
    .days-badge.upcoming { background: rgba(234,179,8,0.15);  color: #ca8a04; }
    .days-badge.future   { background: rgba(34,197,94,0.15);  color: #16a34a; }
    .days-badge.past     { background: rgba(148,163,184,0.12);color: #94a3b8; }

    /* ── main list ── */
    ul.main-list { list-style: none; }

    ul.main-list > li {
      border-bottom: 1px solid var(--border-light);
      padding: 8px 0;
    }

    ul.main-list > li:last-child { border-bottom: none; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-text { flex: 1; font-size: 0.95rem; color: var(--text); }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 5px;
      border-radius: 4px;
      color: var(--text-faint);
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }

    .btn-icon:hover        { color: var(--text-muted); background: rgba(148,163,184,0.1); }
    .btn-icon.delete:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    .btn-icon.edit:hover   { color: #3b82f6; background: rgba(59,130,246,0.1); }

    .btn-check {
      background: none;
      border: 2px solid #22c55e;
      color: #22c55e;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }

    .btn-check:hover    { background: #22c55e; color: #fff; }
    .btn-check:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── inline edit ── */
    .edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 1.5px solid #3b82f6;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      background: var(--input-bg);
      color: var(--input-text);
    }

    .btn-save {
      padding: 5px 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-save:hover { background: #2563eb; }

    /* ── sub-items ── */
    ul.sub-list {
      list-style: none;
      margin: 4px 0 4px 34px;
    }

    ul.sub-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 0.88rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-light);
    }

    ul.sub-list li:last-child { border-bottom: none; }
    ul.sub-list li .arrow    { color: var(--text-faint); flex-shrink: 0; }
    ul.sub-list li .sub-text { flex: 1; }

    .sub-input-row {
      display: flex;
      gap: 6px;
      margin: 6px 0 4px 34px;
    }

    .sub-input-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 0.88rem;
      outline: none;
      background: var(--input-bg);
      color: var(--input-text);
    }

    .sub-input-row input::placeholder { color: var(--placeholder); }
    .sub-input-row input:focus { border-color: #94a3b8; }

    .sub-input-row button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--sub-btn-bg);
      color: var(--sub-btn-text);
      transition: background 0.15s;
    }

    .sub-input-row button:hover { filter: brightness(1.1); }

    /* ── finished section ── */
    .finished-group { margin-bottom: 20px; }
    .finished-group:last-child { margin-bottom: 0; }

    .finished-group-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    .finished-item {
      padding: 7px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .finished-item:last-child { border-bottom: none; }

    .finished-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .done-text {
      flex: 1;
      font-size: 0.93rem;
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .done-date {
      font-size: 0.75rem;
      color: var(--text-faint);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-restore {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.75rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .btn-restore:hover { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,0.08); }

    ul.done-subs { list-style: none; margin: 2px 0 4px 8px; }

    ul.done-subs li {
      font-size: 0.82rem;
      color: var(--text-faint);
      text-decoration: line-through;
      padding: 2px 0;
    }

    .empty      { color: var(--text-faint); font-size: 0.9rem; font-style: italic; }
    .no-results { color: var(--text-faint); font-size: 0.9rem; font-style: italic; }

    /* ── view toggle ── */
    .view-toggle {
      display: flex;
      gap: 6px;
      background: var(--surface);
      border-radius: 10px;
      padding: 5px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .view-tab {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: none;
      color: var(--text-muted);
      transition: all 0.18s;
    }

    .view-tab.active {
      background: var(--bg);
      color: var(--text);
      box-shadow: 0 1px 4px var(--shadow);
    }

    /* ── chrono section ── */
    .chrono-section {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .chrono-section h2 { font-size: 1.2rem; color: #2563eb; margin-bottom: 4px; }

    .chrono-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .chrono-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .chrono-item:last-child { border-bottom: none; }

    .chrono-type {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .chrono-type.task        { background: rgba(59,130,246,0.15);  color: #3b82f6; }
    .chrono-type.competition { background: rgba(249,115,22,0.15);  color: #f97316; }
    .chrono-type.idea        { background: rgba(168,85,247,0.15);  color: #a855f7; }

    .chrono-text { flex: 1; font-size: 0.95rem; color: var(--text); }

    .chrono-no-date {
      font-size: 0.72rem;
      color: var(--text-faint);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <h1>Veer's To-Do App</h1>

  <div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search-input" type="text" placeholder="Search everything..." maxlength="100"
               oninput="handleSearch(this.value)" />
      </div>
      <div class="stats-export-row">
        <div class="stats-bar" id="stats-bar"></div>
        <div class="top-actions">
          <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
          <button class="export-btn" onclick="exportData()">↓ Export</button>
        </div>
      </div>
    </div>

    <!-- VIEW TOGGLE -->
    <div class="view-toggle">
      <button class="view-tab active" id="tab-normal" onclick="switchView('normal')">Normal View</button>
      <button class="view-tab" id="tab-chrono" onclick="switchView('chrono')">Chronological</button>
    </div>

    <!-- TODAY ALERT -->
    <div id="today-alert" style="display:none;"></div>

    <!-- CHRONO VIEW -->
    <div class="chrono-section" id="chrono-section" style="display:none;">
      <h2>What to Do First</h2>
      <p class="chrono-subtitle">All items sorted by date — most urgent at the top</p>
      <div id="chrono-list"></div>
    </div>

    <!-- TASKS -->
    <div class="section tasks">
      <div class="section-header"><h2>Tasks</h2></div>
      <div class="add-row">
        <input id="task-input" type="text" placeholder="Add a task..." maxlength="200" />
        <select id="task-priority">
          <option value="critical">Very Important</option>
          <option value="high">Important</option>
          <option value="medium" selected>Normal</option>
          <option value="low">Low Priority</option>
          <option value="note">Just Think About It</option>
        </select>
        <input id="task-due" type="date" />
        <button class="add-btn" onclick="addItem('task')">Add</button>
      </div>
      <ul class="main-list" id="task-list"></ul>
    </div>

    <!-- COMPETITIONS -->
    <div class="section competitions">
      <div class="section-header">
        <h2>Competitions</h2>
        <button class="notif-btn" id="notif-btn" onclick="requestNotifications()">🔔 Notify me</button>
      </div>
      <div class="add-row">
        <input id="comp-input" type="text" placeholder="Competition name..." maxlength="200" />
        <input id="comp-date" type="date" />
        <select id="comp-priority">
          <option value="critical">Very Important</option>
          <option value="high">Important</option>
          <option value="medium" selected>Normal</option>
          <option value="low">Low Priority</option>
          <option value="note">Just Think About It</option>
        </select>
        <button class="add-btn" onclick="addCompetition()">Add</button>
      </div>
      <ul class="main-list" id="comp-list"></ul>
    </div>

    <!-- IDEAS -->
    <div class="section ideas">
      <div class="section-header"><h2>Ideas</h2></div>
      <div class="add-row">
        <input id="idea-input" type="text" placeholder="Capture an idea..." maxlength="200" />
        <select id="idea-priority">
          <option value="critical">Very Important</option>
          <option value="high">Important</option>
          <option value="medium" selected>Normal</option>
          <option value="low">Low Priority</option>
          <option value="note">Just Think About It</option>
        </select>
        <button class="add-btn" onclick="addItem('idea')">Add</button>
      </div>
      <ul class="main-list" id="idea-list"></ul>
    </div>

    <!-- FINISHED -->
    <div class="section finished-box" id="finished-section">
      <div class="section-header"><h2>Finished</h2></div>
      <div id="finished-list"></div>
    </div>

  </div>

  <script>
    /* ── data init ── */
    let data;
    try {
      const saved = localStorage.getItem('veer-todo');
      data = saved ? JSON.parse(saved) : {};
    } catch(e) { data = {}; }
    if (!Array.isArray(data.tasks))        data.tasks        = [];
    if (!Array.isArray(data.ideas))        data.ideas        = [];
    if (!Array.isArray(data.competitions)) data.competitions = [];
    if (!Array.isArray(data.finished))     data.finished     = Array.isArray(data.completed) ? [...data.completed] : [];
    save();

    const openSubs = new Set();
    let searchQuery = '';
    let editing = null;

    function save() {
      try { localStorage.setItem('veer-todo', JSON.stringify(data)); } catch(e) {}
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
    }

    /* ── theme ── */
    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('veer-theme', next);
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    // set correct icon on load
    (function() {
      const t = document.documentElement.getAttribute('data-theme');
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
    })();

    /* ── route render ── */
    function renderSection(type) {
      if (type === 'competition') renderCompetitions();
      else render(type);
      if (currentView === 'chrono') renderChronological();
    }

    /* ── view toggle ── */
    let currentView = 'normal';

    function switchView(v) {
      currentView = v;
      document.getElementById('tab-normal').classList.toggle('active', v === 'normal');
      document.getElementById('tab-chrono').classList.toggle('active', v === 'chrono');
      document.getElementById('chrono-section').style.display = v === 'chrono' ? '' : 'none';
      ['task-list','comp-list','idea-list'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.closest('.section').style.display = v === 'normal' ? '' : 'none';
      });
      document.querySelector('.section.finished-box').style.display = v === 'normal' ? '' : 'none';
      if (v === 'chrono') renderChronological();
    }

    /* ── chrono render ── */
    const PRI_ORDER = { critical: 0, high: 1, medium: 2, low: 3, note: 4 };

    function renderChronological() {
      const list = document.getElementById('chrono-list');
      const all = [];

      data.tasks.forEach((item, i) => {
        if (matchesSearch(item)) all.push({ ...item, _type: 'task', _i: i, _date: item.dueDate || null });
      });
      data.competitions.forEach((item, i) => {
        if (matchesSearch(item)) all.push({ ...item, _type: 'competition', _i: i, _date: item.date || null });
      });
      data.ideas.forEach((item, i) => {
        if (matchesSearch(item)) all.push({ ...item, _type: 'idea', _i: i, _date: null });
      });

      if (!all.length) { list.innerHTML = '<p class="empty">Nothing to show.</p>'; return; }

      const today = new Date(); today.setHours(0,0,0,0);

      all.sort((a, b) => {
        const hasA = !!a._date, hasB = !!b._date;
        if (hasA && hasB) {
          const diff = new Date(a._date + 'T00:00:00') - new Date(b._date + 'T00:00:00');
          if (diff !== 0) return diff;
        }
        if (hasA && !hasB) return -1;
        if (!hasA && hasB) return 1;
        return (PRI_ORDER[a.priority] || 2) - (PRI_ORDER[b.priority] || 2);
      });

      list.innerHTML = all.map(item => {
        const dateHtml = item._date ? daysBadge(item._date) : `<span class="chrono-no-date">No date</span>`;
        const completeCall = item._type === 'competition'
          ? `completeCompetition(${item._i},this)`
          : `completeItem('${item._type}',${item._i},this)`;
        return `<div class="chrono-item">
          <button class="btn-check" onclick="${completeCall}" title="Mark finished">✓</button>
          <span class="chrono-type ${item._type}">${item._type === 'competition' ? 'comp' : item._type}</span>
          ${priBadge(item.priority)}
          <span class="chrono-text">${escapeHtml(item.text)}</span>
          ${dateHtml}
        </div>`;
      }).join('');
    }

    /* ── search ── */
    function handleSearch(val) {
      searchQuery = val.toLowerCase().trim();
      render('task'); render('idea'); renderCompetitions();
      if (currentView === 'chrono') renderChronological();
    }

    function matchesSearch(item) {
      if (!searchQuery) return true;
      if (item.text && item.text.toLowerCase().includes(searchQuery)) return true;
      if (item.subs && item.subs.some(s => s.toLowerCase().includes(searchQuery))) return true;
      return false;
    }

    /* ── stats ── */
    function renderStats() {
      const now = new Date();
      const weekAgo  = new Date(now - 7  * 864e5);
      const monthAgo = new Date(now - 30 * 864e5);
      const week  = data.finished.filter(i => i.finishedAt && new Date(i.finishedAt) > weekAgo).length;
      const month = data.finished.filter(i => i.finishedAt && new Date(i.finishedAt) > monthAgo).length;
      const total = data.finished.length;
      document.getElementById('stats-bar').innerHTML =
        `<span>This week: <strong>${week}</strong></span>` +
        `<span>This month: <strong>${month}</strong></span>` +
        `<span>All time: <strong>${total}</strong></span>`;
    }

    /* ── today alert ── */
    function renderTodayAlert() {
      const today = new Date(); today.setHours(0,0,0,0);
      const todays = data.competitions.filter(c => {
        if (!c.date) return false;
        return new Date(c.date + 'T00:00:00').getTime() === today.getTime();
      });
      const el = document.getElementById('today-alert');
      if (!todays.length) { el.style.display = 'none'; return; }
      el.style.display = '';
      el.className = 'today-alert';
      el.innerHTML = `🏆 Competition${todays.length > 1 ? 's' : ''} today: <strong>${todays.map(c => escapeHtml(c.text)).join(', ')}</strong> — Good luck Veer!`;
    }

    /* ── notifications ── */
    function requestNotifications() {
      if (!('Notification' in window)) { alert('Your browser does not support notifications.'); return; }
      Notification.requestPermission().then(() => { updateNotifBtn(); checkNotifications(); });
    }

    function updateNotifBtn() {
      const btn = document.getElementById('notif-btn');
      if (!btn) return;
      if (Notification.permission === 'granted') { btn.textContent = '🔔 On'; btn.classList.add('on'); }
      else { btn.textContent = '🔔 Notify me'; btn.classList.remove('on'); }
    }

    function checkNotifications() {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      const today    = new Date(); today.setHours(0,0,0,0);
      const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
      data.competitions.forEach(c => {
        if (!c.date) return;
        const d = new Date(c.date + 'T00:00:00');
        if (d.getTime() === today.getTime())
          new Notification('🏆 Competition Today!', { body: c.text });
        else if (d.getTime() === tomorrow.getTime())
          new Notification('⏰ Competition Tomorrow', { body: c.text });
      });
    }

    /* ── badges ── */
    function daysBadge(dateStr) {
      if (!dateStr) return '';
      const today = new Date(); today.setHours(0,0,0,0);
      const d    = new Date(dateStr + 'T00:00:00');
      const diff = Math.round((d - today) / 864e5);
      let cls, label;
      if (diff === 0)      { cls = 'today';    label = 'Today!'; }
      else if (diff < 0)   { cls = 'past';     label = `${Math.abs(diff)}d ago`; }
      else if (diff <= 3)  { cls = 'urgent';   label = `${diff}d away`; }
      else if (diff <= 7)  { cls = 'soon';     label = `${diff}d away`; }
      else if (diff <= 30) { cls = 'upcoming'; label = `${diff}d away`; }
      else                 { cls = 'future';   label = `${diff}d away`; }
      return `<span class="days-badge ${cls}">${label}</span>`;
    }

    const PRI_LABELS = { critical: 'VERY IMPORTANT', high: 'IMPORTANT', low: 'LOW PRIORITY', note: 'THINK ABOUT IT' };
    function priBadge(p) {
      if (!p || p === 'medium' || !PRI_LABELS[p]) return '';
      return `<span class="pri-badge ${p}">${PRI_LABELS[p]}</span>`;
    }

    /* ── add item ── */
    function addItem(type) {
      const input  = document.getElementById(`${type}-input`);
      const priSel = document.getElementById(`${type}-priority`);
      const dueEl  = document.getElementById(`${type}-due`);
      const text   = input.value.trim();
      if (!text) return;
      const item = { text, subs: [], priority: priSel ? priSel.value : 'medium' };
      if (dueEl) item.dueDate = dueEl.value;
      data[type + 's'].push(item);
      input.value = ''; if (dueEl) dueEl.value = '';
      save(); render(type); renderStats(); input.focus();
    }

    /* ── add competition ── */
    function addCompetition() {
      const nameEl = document.getElementById('comp-input');
      const dateEl = document.getElementById('comp-date');
      const priEl  = document.getElementById('comp-priority');
      const text   = nameEl.value.trim();
      if (!text) return;
      data.competitions.push({ text, date: dateEl.value, subs: [], priority: priEl.value });
      nameEl.value = ''; dateEl.value = '';
      save(); renderCompetitions(); renderTodayAlert(); checkNotifications(); nameEl.focus();
    }

    /* ── edit ── */
    function startEdit(type, i) {
      editing = { type, i };
      renderSection(type);
      setTimeout(() => { const el = document.getElementById(`edit-${type}-${i}`); if (el) { el.focus(); el.select(); } }, 0);
    }

    function saveEdit(type, i) {
      const el = document.getElementById(`edit-${type}-${i}`);
      const text = el ? el.value.trim() : '';
      if (text) {
        const arr = type === 'competition' ? data.competitions : data[type + 's'];
        arr[i].text = text;
        save();
      }
      editing = null; renderSection(type);
    }

    function cancelEdit() {
      if (!editing) return;
      const { type } = editing; editing = null; renderSection(type);
    }

    /* ── sub-items ── */
    function toggleSubInput(type, i) {
      const key = `${type}-${i}`;
      openSubs.has(key) ? openSubs.delete(key) : openSubs.add(key);
      renderSection(type);
      if (openSubs.has(key)) setTimeout(() => document.getElementById(`sub-text-${type}-${i}`)?.focus(), 0);
    }

    function addSub(type, i) {
      const input = document.getElementById(`sub-text-${type}-${i}`);
      const text  = input ? input.value.trim() : '';
      if (!text) return;
      const arr = type === 'competition' ? data.competitions : data[type + 's'];
      if (!Array.isArray(arr[i].subs)) arr[i].subs = [];
      arr[i].subs.push(text);
      input.value = '';
      save(); renderSection(type);
      setTimeout(() => document.getElementById(`sub-text-${type}-${i}`)?.focus(), 0);
    }

    function deleteSub(type, i, j) {
      const arr = type === 'competition' ? data.competitions : data[type + 's'];
      (arr[i].subs || []).splice(j, 1);
      save(); renderSection(type);
    }

    /* ── complete ── */
    function completeItem(type, i, btn) {
      if (btn) btn.disabled = true;
      const item = data[type + 's'].splice(i, 1)[0];
      openSubs.clear();
      data.finished.unshift({ ...item, subs: item.subs || [], type, finishedAt: new Date().toISOString() });
      save(); render(type); renderFinished(); renderStats();
    }

    function completeCompetition(i, btn) {
      if (btn) btn.disabled = true;
      const item = data.competitions.splice(i, 1)[0];
      openSubs.clear();
      data.finished.unshift({ ...item, subs: item.subs || [], type: 'competition', finishedAt: new Date().toISOString() });
      save(); renderCompetitions(); renderFinished(); renderStats(); renderTodayAlert();
    }

    /* ── delete ── */
    function deleteItem(type, i) {
      data[type + 's'].splice(i, 1); openSubs.clear(); save(); render(type);
    }

    function deleteCompetition(i) {
      data.competitions.splice(i, 1); openSubs.clear(); save(); renderCompetitions(); renderTodayAlert();
    }

    /* ── restore ── */
    function restoreItem(i) {
      const item = data.finished.splice(i, 1)[0];
      const restored = { text: item.text, subs: item.subs || [], priority: item.priority || 'medium' };
      if (item.dueDate) restored.dueDate = item.dueDate;
      if (item.date)    restored.date    = item.date;
      if (item.type === 'competition') { data.competitions.push(restored); renderCompetitions(); renderTodayAlert(); }
      else { data[item.type + 's'].push(restored); render(item.type); }
      save(); renderFinished(); renderStats();
    }

    /* ── build item HTML ── */
    function buildItem(type, item, i) {
      const key       = `${type}-${i}`;
      const subOpen   = openSubs.has(key);
      const isEditing = editing && editing.type === type && editing.i === i;
      const subs      = item.subs || [];

      if (isEditing) {
        return `<li><div class="item-row">
          <input class="edit-input" id="edit-${type}-${i}" value="${escapeHtml(item.text)}" maxlength="200"
                 onkeydown="if(event.key==='Enter') saveEdit('${type}',${i}); if(event.key==='Escape') cancelEdit()" />
          <button class="btn-save" onclick="saveEdit('${type}',${i})">Save</button>
          <button class="btn-icon" onclick="cancelEdit()" title="Cancel">&#x2715;</button>
        </div></li>`;
      }

      const dateHtml    = type === 'competition' ? daysBadge(item.date) : (item.dueDate ? daysBadge(item.dueDate) : '');
      const completeCall = type === 'competition' ? `completeCompetition(${i},this)` : `completeItem('${type}',${i},this)`;
      const deleteCall   = type === 'competition' ? `deleteCompetition(${i})` : `deleteItem('${type}',${i})`;

      const subItems = subs.map((sub, j) => `
        <li>
          <span class="arrow">↳</span>
          <span class="sub-text">${escapeHtml(sub)}</span>
          <button class="btn-icon delete" onclick="deleteSub('${type}',${i},${j})" title="Remove">&#x2715;</button>
        </li>`).join('');

      const subInput = subOpen ? `
        <div class="sub-input-row">
          <input id="sub-text-${type}-${i}" type="text" placeholder="Add sub-item..." maxlength="200"
                 onkeydown="if(event.key==='Enter') addSub('${type}',${i})" />
          <button onclick="addSub('${type}',${i})">Add</button>
        </div>` : '';

      return `<li>
        <div class="item-row">
          <button class="btn-check" onclick="${completeCall}" title="Mark finished">✓</button>
          ${priBadge(item.priority)}
          <span class="item-text">${escapeHtml(item.text)}</span>
          ${dateHtml}
          <button class="btn-icon edit" onclick="startEdit('${type}',${i})" title="Edit">✎</button>
          <button class="btn-icon" onclick="toggleSubInput('${type}',${i})" title="${subOpen ? 'Close' : 'Add sub-item'}">${subOpen ? '−' : '+'}</button>
          <button class="btn-icon delete" onclick="${deleteCall}" title="Delete">&#x2715;</button>
        </div>
        ${subs.length ? `<ul class="sub-list">${subItems}</ul>` : ''}
        ${subInput}
      </li>`;
    }

    /* ── render tasks / ideas ── */
    function render(type) {
      const list  = document.getElementById(`${type}-list`);
      const items = data[type + 's'];
      if (!items.length) { list.innerHTML = `<li class="empty">Nothing here yet.</li>`; return; }
      if (!items.filter(matchesSearch).length) {
        list.innerHTML = `<li class="no-results">No results for &ldquo;${escapeHtml(searchQuery)}&rdquo;</li>`; return;
      }
      list.innerHTML = items.map((item, i) => matchesSearch(item) ? buildItem(type, item, i) : '').join('');
    }

    /* ── render competitions ── */
    function renderCompetitions() {
      const list  = document.getElementById('comp-list');
      const items = data.competitions;
      if (!items.length) { list.innerHTML = `<li class="empty">No competitions yet.</li>`; return; }
      if (!items.filter(matchesSearch).length) {
        list.innerHTML = `<li class="no-results">No results for &ldquo;${escapeHtml(searchQuery)}&rdquo;</li>`; return;
      }
      list.innerHTML = items.map((item, i) => matchesSearch(item) ? buildItem('competition', item, i) : '').join('');
    }

    /* ── render finished ── */
    function renderFinished() {
      const list   = document.getElementById('finished-list');
      const groups = [
        { type: 'task',        label: 'Finished Tasks' },
        { type: 'competition', label: 'Finished Competitions' },
        { type: 'idea',        label: 'Finished Ideas' },
      ];
      let html = '';
      for (const group of groups) {
        const items = data.finished.map((item, i) => ({ ...item, _idx: i })).filter(i => i.type === group.type);
        html += `<div class="finished-group"><h3 class="finished-group-title">${group.label}</h3>`;
        if (!items.length) { html += `<p class="empty">Nothing here yet.</p>`; }
        else html += items.map(item => {
          const subs = item.subs && item.subs.length
            ? `<ul class="done-subs">${item.subs.map(s => `<li>↳ ${escapeHtml(s)}</li>`).join('')}</ul>` : '';
          const date = item.finishedAt
            ? new Date(item.finishedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
          return `<div class="finished-item"><div class="finished-row">
            <span class="done-text">${escapeHtml(item.text)}</span>
            ${date ? `<span class="done-date">${date}</span>` : ''}
            <button class="btn-restore" onclick="restoreItem(${item._idx})">↩ Restore</button>
          </div>${subs}</div>`;
        }).join('');
        html += '</div>';
      }
      list.innerHTML = html;
    }

    /* ── export ── */
    function exportData() {
      const lines = ["=== VEER'S TO-DO APP EXPORT ===", `Exported: ${new Date().toLocaleString()}`, ''];
      const section = (title, items, getExtra) => {
        lines.push(`--- ${title} ---`);
        if (!items.length) lines.push('(empty)');
        else items.forEach(it => {
          const pri = it.priority && it.priority !== 'medium' ? `[${it.priority.toUpperCase()}] ` : '';
          lines.push(`${pri}${it.text}${getExtra(it)}`);
          (it.subs || []).forEach(s => lines.push(`  ↳ ${s}`));
        });
        lines.push('');
      };
      section('TASKS',        data.tasks,       t => t.dueDate ? ` (due: ${t.dueDate})` : '');
      section('COMPETITIONS', data.competitions, c => c.date    ? ` (${c.date})` : '');
      section('IDEAS',        data.ideas,        () => '');
      section('FINISHED',     data.finished,     f  => f.finishedAt ? ` [${f.type}] — done ${new Date(f.finishedAt).toLocaleDateString()}` : '');
      const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: `veer-todo-${new Date().toISOString().split('T')[0]}.txt` });
      a.click(); URL.revokeObjectURL(url);
    }

    /* ── listeners ── */
    document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem('task'); });
    document.getElementById('idea-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem('idea'); });
    document.getElementById('comp-input').addEventListener('keydown', e => { if (e.key === 'Enter') addCompetition(); });

    /* ── init ── */
    updateNotifBtn(); checkNotifications();
    render('task'); render('idea'); renderCompetitions();
    renderFinished(); renderStats(); renderTodayAlert();
  </script>

</body>
</html>
